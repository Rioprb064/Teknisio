<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="description" content="Profil Akun Teknisio — Kelola informasi akun Anda.">
  <title>Profil — Teknisio</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    /* Profile Header */
    .profile-header {
      background: linear-gradient(135deg, #1A1A2E 0%, #2D3A8C 100%);
      padding: 40px 20px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      position: relative;
    }

    .profile-avatar-wrap {
      width: 88px; height: 88px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.3);
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.15);
      font-size: 32px;
      font-weight: 800;
      color: white;
      overflow: hidden;
      position: relative;
    }

    .profile-camera-btn {
      position: absolute;
      bottom: 0; right: 0;
      width: 26px; height: 26px;
      background: white;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 13px;
    }

    .profile-name {
      font-size: 22px;
      font-weight: 800;
      color: white;
    }

    .profile-email {
      font-size: 13px;
      color: rgba(255,255,255,0.65);
    }

    .profile-role-badge {
      background: rgba(79,110,247,0.3);
      border: 1px solid rgba(79,110,247,0.5);
      color: #A5B4FC;
      padding: 4px 14px;
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    /* Stats row */
    .profile-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      background: white;
      border-radius: var(--radius-md);
      margin: -24px 20px 0;
      position: relative;
      z-index: 10;
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 18px 8px;
      gap: 3px;
    }

    .stat-item + .stat-item {
      border-left: 1px solid var(--border);
    }

    .stat-value {
      font-size: 20px;
      font-weight: 800;
      color: var(--text-primary);
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
      text-align: center;
    }

    /* Info sections */
    .profile-body {
      padding: 20px 20px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .info-card {
      background: var(--bg-card);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }

    .info-card-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 14px 16px 8px;
    }

    .info-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      cursor: pointer;
      transition: var(--transition);
    }

    .info-row:hover { background: var(--bg-input); }

    .info-row + .info-row { border-top: 1px solid var(--border); }

    .info-row-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      min-width: 0;
    }

    .info-icon {
      width: 38px; height: 38px;
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .info-icon.blue   { background: #EEF2FF; }
    .info-icon.green  { background: #DCFCE7; }
    .info-icon.yellow { background: #FEF9C3; }
    .info-icon.red    { background: #FEE2E2; }
    .info-icon.gray   { background: var(--bg-input); }

    .info-text { flex: 1; min-width: 0; }

    .info-label {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .info-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-top: 1px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .info-arrow {
      color: var(--text-muted);
      flex-shrink: 0;
      margin-left: 8px;
    }

    /* Menu items */
    .menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      cursor: pointer;
      transition: var(--transition);
    }

    .menu-item:hover { background: var(--bg-input); }
    .menu-item + .menu-item { border-top: 1px solid var(--border); }

    .menu-label {
      flex: 1;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .menu-label.danger { color: var(--danger); }

    .menu-arrow { color: var(--text-muted); }

    /* App version */
    .app-version {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      padding: 16px 0 8px;
    }

    /* Bottom padding */
    .profile-bottom-space { height: 20px; }

    /* Edit modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-sheet {
      background: white;
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-width: var(--max-w);
      padding: 20px 20px 40px;
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }

    .modal-overlay.active .modal-sheet {
      transform: translateY(0);
    }

    .modal-handle {
      width: 40px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div id="toast-container"></div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="edit-modal" onclick="closeModal(event)">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">Edit Profil</div>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="form-group">
          <label class="form-label">Nama Lengkap</label>
          <input class="form-input" type="text" id="edit-nama" placeholder="Nama lengkap">
        </div>
        <div class="form-group">
          <label class="form-label">No. Telepon</label>
          <input class="form-input" type="tel" id="edit-telepon" placeholder="08xxx">
        </div>
        <div class="form-group">
          <label class="form-label">Alamat</label>
          <textarea class="form-input" id="edit-alamat" rows="2" placeholder="Alamat lengkap" style="resize:none"></textarea>
        </div>
        <button class="btn btn-primary btn-block" onclick="saveProfile()">Simpan Perubahan</button>
        <button class="btn btn-ghost btn-block" onclick="closeModal()">Batal</button>
      </div>
    </div>
  </div>

  <div class="app-shell">
    <!-- Profile Header -->
    <div class="profile-header">
      <div class="profile-avatar-wrap" id="profile-avatar-wrap">
        <span id="profile-avatar-initials">?</span>
        <div class="profile-camera-btn" onclick="showToast('Fitur ganti foto segera hadir!', 'info')">📷</div>
      </div>
      <div class="profile-name" id="profile-name">Loading...</div>
      <div class="profile-email" id="profile-email">-</div>
      <div class="profile-role-badge" id="profile-role">-</div>
    </div>

    <!-- Stats -->
    <div class="profile-stats">
      <div class="stat-item">
        <span class="stat-value" id="stat-orders">0</span>
        <span class="stat-label">Pesanan</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="stat-done">0</span>
        <span class="stat-label">Selesai</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="stat-rating">—</span>
        <span class="stat-label">Rating</span>
      </div>
    </div>

    <div class="page-content">
      <div class="profile-body">

        <!-- Info Akun -->
        <div class="info-card">
          <div class="info-card-title">Informasi Akun</div>

          <div class="info-row" onclick="openEditModal()">
            <div class="info-row-left">
              <div class="info-icon blue">👤</div>
              <div class="info-text">
                <div class="info-label">Nama Lengkap</div>
                <div class="info-value" id="info-nama">-</div>
              </div>
            </div>
            <svg class="info-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          </div>

          <div class="info-row" onclick="showToast('Hubungi admin untuk mengubah email', 'info')">
            <div class="info-row-left">
              <div class="info-icon green">📧</div>
              <div class="info-text">
                <div class="info-label">Email</div>
                <div class="info-value" id="info-email">-</div>
              </div>
            </div>
            <svg class="info-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          </div>

          <div class="info-row" onclick="openEditModal()">
            <div class="info-row-left">
              <div class="info-icon yellow">📱</div>
              <div class="info-text">
                <div class="info-label">No. Telepon</div>
                <div class="info-value" id="info-telepon">-</div>
              </div>
            </div>
            <svg class="info-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          </div>

          <div class="info-row" onclick="openEditModal()">
            <div class="info-row-left">
              <div class="info-icon gray">📍</div>
              <div class="info-text">
                <div class="info-label">Alamat</div>
                <div class="info-value" id="info-alamat">-</div>
              </div>
            </div>
            <svg class="info-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
        </div>

        <!-- Menu -->
        <div class="info-card">
          <div class="info-card-title">Layanan</div>
          <div class="menu-item" onclick="window.location.href='history.html'">
            <div class="info-icon blue">📋</div>
            <span class="menu-label">Riwayat Pesanan</span>
            <svg class="menu-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
          <div class="menu-item" onclick="showToast('Fitur notifikasi segera hadir!', 'info')">
            <div class="info-icon yellow">🔔</div>
            <span class="menu-label">Notifikasi</span>
            <svg class="menu-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
          <div class="menu-item" onclick="showToast('Fitur bantuan segera hadir!', 'info')">
            <div class="info-icon green">❓</div>
            <span class="menu-label">Bantuan & FAQ</span>
            <svg class="menu-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
        </div>

        <!-- Logout -->
        <div class="info-card">
          <div class="menu-item" onclick="doLogout()">
            <div class="info-icon red">🚪</div>
            <span class="menu-label danger">Keluar dari Akun</span>
          </div>
        </div>

        <div class="app-version">Teknisio v1.0.0 · UAS PBO 2026</div>
        <div class="profile-bottom-space"></div>
      </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <a href="home.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Home</span>
      </a>
      <a href="chat.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>Chat</span>
      </a>
      <a href="order.html" class="nav-item-order">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" width="24" height="24">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </a>
      <a href="history.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span>Riwayat</span>
      </a>
      <a href="profile.html" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="12" cy="7" r="4" fill="currentColor"/></svg>
        <span>Akun</span>
      </a>
    </nav>
  </div>

  <script src="js/api.js"></script>
  <script>
    if (!Auth.requireAuth()) throw new Error('Not auth');

    let userData = null;

    async function loadProfile() {
      userData = Auth.getUser() || {};

      try {
        const profile = await AuthAPI.getProfile();
        userData = { ...userData, ...profile };
        Auth.setUser(userData);
      } catch {}

      renderProfile();
    }

    function renderProfile() {
      const u = userData;

      // Avatar
      const initials = avatarInitials(u.nama || 'User');
      const colors = ['#2D3A8C','#4F6EF7','#0EA5E9','#10B981','#F59E0B'];
      const bg = colors[(u.nama?.charCodeAt(0) || 0) % colors.length];
      const wrap = document.getElementById('profile-avatar-wrap');
      wrap.style.background = bg;
      document.getElementById('profile-avatar-initials').textContent = initials;

      // Info
      document.getElementById('profile-name').textContent    = u.nama        || '-';
      document.getElementById('profile-email').textContent   = u.email       || '-';
      document.getElementById('profile-role').textContent    = u.role        || 'CUSTOMER';
      document.getElementById('info-nama').textContent       = u.nama        || '-';
      document.getElementById('info-email').textContent      = u.email       || '-';
      document.getElementById('info-telepon').textContent    = u.noTelepon   || '-';
      document.getElementById('info-alamat').textContent     = u.alamat      || '-';

      // Stats (mock)
      const orders = getMockOrders();
      document.getElementById('stat-orders').textContent = orders.length;
      document.getElementById('stat-done').textContent   = orders.filter(o => o.status === 'COMPLETED').length;
      document.getElementById('stat-rating').textContent = u.ratingAvg ? u.ratingAvg.toFixed(1) : '4.5';
    }

    function openEditModal() {
      document.getElementById('edit-nama').value    = userData?.nama      || '';
      document.getElementById('edit-telepon').value = userData?.noTelepon || '';
      document.getElementById('edit-alamat').value  = userData?.alamat    || '';
      document.getElementById('edit-modal').classList.add('active');
    }

    function closeModal(e) {
      if (!e || e.target === document.getElementById('edit-modal')) {
        document.getElementById('edit-modal').classList.remove('active');
      }
    }

    function saveProfile() {
      const nama    = document.getElementById('edit-nama').value.trim();
      const telepon = document.getElementById('edit-telepon').value.trim();
      const alamat  = document.getElementById('edit-alamat').value.trim();

      if (!nama) { showToast('Nama tidak boleh kosong', 'warning'); return; }

      // Update local state
      userData = { ...userData, nama, noTelepon: telepon, alamat };
      Auth.setUser(userData);
      renderProfile();

      closeModal();
      showToast('Profil berhasil diperbarui!', 'success');

      // Note: API endpoint PUT /api/users/me belum tersedia di backend
    }

    function doLogout() {
      if (!confirm('Apakah Anda yakin ingin keluar?')) return;
      showToast('Sampai jumpa!', 'info');
      setTimeout(() => { Auth.logout(); }, 800);
    }

    loadProfile();
  </script>
</body>
</html>
