spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: ${APP_NAME:teknisio-backend}

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:teknisio_db}
    username: ${POSTGRES_USER:teknisio_user}
    password: ${POSTGRES_PASSWORD:teknisio_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false

server:
  address: 0.0.0.0
  port: ${PORT:${SERVER_PORT:8080}}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  metrics:
    binders:
      processor:
        enabled: false
      system:
        enabled: false
